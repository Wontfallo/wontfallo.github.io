document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

space-between;margin-bottom:6px;\">\n        <div style=\"font-size:14px;font-weight:600;\">{{ calMonth }}<\u002Fdiv>\n        <div style=\"display:flex;gap:2px;align-items:center;\">\n          <button onclick=\"{{ onCalToday }}\" style=\"border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;\">Today<\u002Fbutton>\n          <button onclick=\"{{ onCalPrev }}\" style=\"{{ calNavBtn }}\" style-hover=\"background:var(--sel)\">‹<\u002Fbutton>\n          <button onclick=\"{{ onCalNext }}\" style=\"{{ calNavBtn }}\" style-hover=\"background:var(--sel)\">›<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;\">\n        <sc-for list=\"{{ calDows }}\" as=\"dw\" hint-placeholder-count=\"7\">\n          <div style=\"height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);\">{{ dw }}<\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-for list=\"{{ calCells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n          <div style=\"{{ cell.style }}\">{{ cell.day }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TASKBAR (Win95 / Win11 / Terminal) -->\n  <sc-if value=\"{{ showBottomBar }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"{{ taskbarStyle }}\">\n      <sc-if value=\"{{ isWin11 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ onClockToggle }}\" style=\"position:absolute;left:0;top:0;height:100%;display:flex;align-items:center;gap:9px;padding:0 14px;border-radius:8px;cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.07)\">\n          <span style=\"font-size:20px;line-height:1;\">{{ weatherEmoji }}<\u002Fspan>\n          <div style=\"display:flex;flex-direction:column;line-height:1.15;\">\n            <span style=\"font-size:12px;font-weight:600;color:var(--win-text);\">{{ weatherTemp }}<\u002Fspan>\n            <span style=\"font-size:11px;color:var(--muted);\">{{ weatherText }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"{{ taskClusterStyle }}\">\n        <button onclick=\"{{ onStartToggle }}\" style=\"{{ startBtnStyle }}\">\n          <sc-if value=\"{{ isWin11 }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2.5px;width:19px;height:19px;\">\n              <span style=\"background:var(--accent);border-radius:1.5px;\"><\u002Fspan><span style=\"background:var(--accent);border-radius:1.5px;\"><\u002Fspan><span style=\"background:var(--accent);border-radius:1.5px;\"><\u002Fspan><span style=\"background:var(--accent);border-radius:1.5px;\"><\u002Fspan>\n            <\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notWin11 }}\" hint-placeholder-val=\"{{ true }}\">{{ startBtnLabel }}<\u002Fsc-if>\n        <\u002Fbutton>\n        <sc-if value=\"{{ isWin11 }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ onTaskView }}\" title=\"Task view\" style=\"{{ pinBtnStyle }}\" style-hover=\"background:var(--sel)\">❐<\u002Fbutton>\n          <button data-app=\"explorer\" onclick=\"{{ onIconOpen }}\" title=\"File Explorer\" style=\"{{ pinBtnStyle }}\" style-hover=\"background:var(--sel)\">📁<\u002Fbutton>\n          <div style=\"width:1px;height:22px;background:var(--titlebar-border);margin:0 3px;\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ taskItems }}\" as=\"t\" hint-placeholder-count=\"1\">\n          <button data-id=\"{{ t.id }}\" onclick=\"{{ onTaskItem }}\" style=\"{{ t.style }}\" style-hover=\"background:var(--sel)\"><span style=\"font-size:15px;\">{{ t.icon }}<\u002Fspan><sc-if value=\"{{ t.showLabel }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ t.title }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div onclick=\"{{ onClockToggle }}\" style=\"{{ clockStyle }}\" style-hover=\"background:var(--sel)\">\n        <div style=\"font-weight:600;\">{{ timeStr }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted);\">{{ dateStr }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;websiteUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://wontfallo.github.io/&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;wontfallo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultOsStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;fluent&quot;,&quot;classic&quot;,&quot;mac&quot;,&quot;linux&quot;,&quot;terminal&quot;],&quot;default&quot;:&quot;fluent&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem('mockos_v1') || '{}'); } catch(e){}\n    const site = props.websiteUrl || 'https://wontfallo.github.io/';\n    this.state = {\n      osStyle: saved.osStyle || props.defaultOsStyle || 'fluent',\n      mode: saved.mode || props.defaultMode || 'dark',\n      accent: saved.accent || '#2a6fdb',\n      wallpaper: saved.wallpaper || 'auto',\n      notepad: saved.notepad != null ? saved.notepad : \"Welcome to Notepad.\\n\\nThis is a real text editor — type anything and it auto-saves.\\nTip: open the Terminal and run  /about --me\\n\",\n      windows: [{ id:1, app:'terminal', title:'Terminal', x:96, y:60, w:700, h:440, z:11, min:false, max:false }],\n      maxZ: 11, nextId: 2,\n      ctx: { open:false, x:0, y:0, type:'desktop', app:null },\n      startOpen: false,\n      termLines: this.welcome(),\n      termInput: '',\n      calc: { display:'0', prev:null, op:null, fresh:true },\n      browserUrl: site, browserInput: site, bHist: [site], bIdx: 0,\n      path: ['This PC'],\n      paintColor: '#e23b3b', paintSize: 5,\n      tick: 0,\n      trayOpen: false, calOffset: 0,\n      weather: { loading: true },\n    };\n    this.termHistory = [];\n    this.histIdx = 0;\n    this._side = [\n      { name:'This PC', icon:'🖥️', path:['This PC'] },\n      { name:'Documents', icon:'📄', path:['This PC','Documents'] },\n      { name:'Pictures', icon:'🖼️', path:['This PC','Pictures'] },\n      { name:'Projects', icon:'📁', path:['This PC','Projects'] },\n    ];\n  }\n\n  componentDidMount(){\n    this._mm = (e)=>this.onMove(e);\n    this._mu = ()=>{ this.drag=null; this.resize=null; };\n    window.addEventListener('mousemove', this._mm);\n    window.addEventListener('mouseup', this._mu);\n    this._timer = setInterval(()=>this.setState(s=>({tick:s.tick+1})), 1000);\n    this.fetchWeather();\n    this.setupFullscreen();\n  }\n\n  setupFullscreen(){\n    const go = ()=>{ const el=document.documentElement; const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen; if(fn && !document.fullscreenElement){ try{ fn.call(el); }catch(e){} } };\n    go(); // attempt immediately (may be blocked until a gesture)\n    this._fsGesture = ()=>{ go(); window.removeEventListener('pointerdown', this._fsGesture); window.removeEventListener('keydown', this._fsGesture); };\n    window.addEventListener('pointerdown', this._fsGesture);\n    window.addEventListener('keydown', this._fsGesture);\n  }\n\n  // ---------- weather (Open-Meteo, no API key) ----------\n  weatherInfo(code){\n    const m = {\n      0:['☀️','Clear'],1:['🌤️','Mainly clear'],2:['⛅','Partly cloudy'],3:['☁️','Overcast'],\n      45:['🌫️','Fog'],48:['🌫️','Rime fog'],\n      51:['🌦️','Light drizzle'],53:['🌦️','Drizzle'],55:['🌦️','Heavy drizzle'],\n      56:['🌧️','Freezing drizzle'],57:['🌧️','Freezing drizzle'],\n      61:['🌧️','Light rain'],63:['🌧️','Rain'],65:['🌧️','Heavy rain'],\n      66:['🌧️','Freezing rain'],67:['🌧️','Freezing rain'],\n      71:['🌨️','Light snow'],73:['🌨️','Snow'],75:['🌨️','Heavy snow'],77:['🌨️','Snow grains'],\n      80:['🌦️','Rain showers'],81:['🌦️','Rain showers'],82:['⛈️','Violent showers'],\n      85:['🌨️','Snow showers'],86:['🌨️','Snow showers'],\n      95:['⛈️','Thunderstorm'],96:['⛈️','Thunderstorm'],99:['⛈️','Hailstorm'],\n    };\n    return m[code] || ['🌡️','—'];\n  }\n  fetchWeather(){\n    const apply = (lat, lon, approx)=>{\n      fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&temperature_unit=fahrenheit')\n        .then(r=>r.json())\n        .then(d=>{\n          if(!d || !d.current){ this.setState({ weather:{ loading:false, error:true } }); return; }\n          this.setState({ weather:{ loading:false, temp:Math.round(d.current.temperature_2m), code:d.current.weather_code, approx } });\n        })\n        .catch(()=>this.setState({ weather:{ loading:false, error:true } }));\n    };\n    const fallback = ()=>apply(40.7128, -74.0060, true); // NYC fallback if location denied\n    if(navigator.geolocation){\n      navigator.geolocation.getCurrentPosition(\n        p=>apply(p.coords.latitude, p.coords.longitude, false),\n        fallback,\n        { timeout: 8000, maximumAge: 600000 }\n      );\n    } else fallback();\n  }\n  onClockToggle = (e)=>{ e.stopPropagation(); this.setState(s=>({ trayOpen:!s.trayOpen, startOpen:false, ctx:{...s.ctx,open:false} })); };\n  onCalPrev = (e)=>{ e.stopPropagation(); this.setState(s=>({ calOffset:s.calOffset-1 })); };\n  onCalNext = (e)=>{ e.stopPropagation(); this.setState(s=>({ calOffset:s.calOffset+1 })); };\n  onCalToday = (e)=>{ e.stopPropagation(); this.setState({ calOffset:0 }); };\n  componentWillUnmount(){\n    window.removeEventListener('mousemove', this._mm);\n    window.removeEventListener('mouseup', this._mu);\n    if(this._fsGesture){ window.removeEventListener('pointerdown', this._fsGesture); window.removeEventListener('keydown', this._fsGesture); }\n    clearInterval(this._timer);\n  }\n  componentDidUpdate(){ if(this.termBody){ this.termBody.scrollTop = this.termBody.scrollHeight; } }\n\n  // ---------- persistence ----------\n  savePrefs(){\n    try {\n      const { osStyle, mode, accent, wallpaper, notepad } = this.state;\n      localStorage.setItem('mockos_v1', JSON.stringify({ osStyle, mode, accent, wallpaper, notepad }));\n    } catch(e){}\n  }\n\n  // ---------- theme tokens ----------\n  tk(){\n    const { osStyle:os, mode, accent:A } = this.state;\n    const dark = mode === 'dark';\n    if(os === 'classic'){\n      const win = dark ? '#3a3a3a' : '#c2c2c2';\n      const txt = dark ? '#f2f2f2' : '#0a0a0a';\n      return {\n        '--win-bg':win, '--win-text':txt,\n        '--win-border': dark?'2px solid #565656':'2px solid #efefef',\n        '--win-radius':'0',\n        '--win-shadow': (dark?'inset 1px 1px 0 #6a6a6a, inset -1px -1px 0 #1c1c1c, ':'inset 1px 1px 0 #ffffff, inset -1px -1px 0 #6f6f6f, ') + '3px 3px 0 rgba(0,0,0,.35), 8px 8px 22px rgba(0,0,0,.35)',\n        '--win-blur':'none',\n        '--titlebar-bg':'linear-gradient(90deg, '+A+', '+A+'bb)',\n        '--titlebar-inactive': dark?'#565656':'#9d9d9d',\n        '--titlebar-text':'#fff',\n        '--titlebar-border': dark?'1px solid #1c1c1c':'1px solid #8a8a8a',\n        '--title-align':'left',\n        '--taskbar-bg':win, '--taskbar-border': dark?'2px solid #6a6a6a':'2px solid #ffffff',\n        '--menu-bg':win, '--menu-text':txt, '--menu-border': dark?'2px solid #1c1c1c':'2px solid #efefef',\n        '--field-bg': dark?'#262626':'#ffffff', '--field-text':txt
